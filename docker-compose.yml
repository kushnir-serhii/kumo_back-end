services:
  postgres:
    image: postgres:16-alpine
    container_name: kumo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kumo
      POSTGRES_PASSWORD: kumo_dev_password
      POSTGRES_DB: kumo_local
    ports:
      - "5433:5432"
    volumes:
      - kumo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kumo -d kumo_local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  kumo_postgres_data:
    driver: local
